<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>音楽ワードさがし</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --cell-size: min(10.2vw, 40px);
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  text-align: center;
  background: #f7f8fc;
  color: #202432;
  -webkit-text-size-adjust: 100%;
}

main {
  width: min(100%, 720px);
  margin: 0 auto;
  padding: 16px 10px 28px;
}

h1 {
  margin: 6px 0 14px;
  font-size: clamp(24px, 7vw, 34px);
}

#levelButtons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 14px 0;
}

button {
  min-height: 44px;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 16px;
  font-weight: bold;
  background: #3467d6;
  color: white;
  cursor: pointer;
  touch-action: manipulation;
}

button.active {
  background: #244da6;
}

#remaining {
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0 14px;
}

#wordList {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 7px;
  margin-bottom: 16px;
}

.word {
  background: white;
  border: 1px solid #d9deeb;
  border-radius: 999px;
  padding: 6px 11px;
  font-size: 14px;
  font-weight: bold;
}

.word.found {
  text-decoration: line-through;
  color: #777;
  background: #eef1f8;
}

#gridWrap {
  display: flex;
  justify-content: center;
  width: 100%;
  overflow: hidden;
}

#grid {
  display: grid;
  gap: 2px;
  justify-content: center;
  margin-bottom: 18px;
  touch-action: none;
  user-select: none;
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  min-width: 28px;
  min-height: 28px;
  background: white;
  border: 1px solid #d9deeb;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(15px, 5.2vw, 22px);
  font-weight: bold;
}

.selected {
  background: #ffd966 !important;
}

#retryButton {
  display: none;
  width: min(100%, 320px);
  background: #d94b5f;
}

@media (min-width: 560px) {
  #levelButtons {
    display: flex;
    justify-content: center;
  }

  #levelButtons button {
    min-width: 112px;
  }
}
</style>
</head>

<body>
<main>
  <h1>音楽ワードさがし</h1>

  <div id="levelButtons">
    <button onclick="startGame('beginner')" id="btn-beginner">初級</button>
    <button onclick="startGame('intermediate')" id="btn-intermediate">中級</button>
    <button onclick="startGame('advanced')" id="btn-advanced">上級</button>
  </div>

  <p id="remaining">あと 0 個</p>

  <div id="wordList"></div>

  <div id="gridWrap">
    <div id="grid"></div>
  </div>

  <button id="retryButton">もう一度</button>
</main>

<audio id="dragSound" src="drag.mp3"></audio>
<audio id="levelSound" src="level.mp3"></audio>
<audio id="retrySound" src="retry.mp3"></audio>
<audio id="clearSound" src="clear.mp3"></audio>

<script>
function playSound(id) {
  const sound = document.getElementById(id);
  if (!sound) return;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

const levels = {
  beginner: {
    size: 8,
    directions: [[0, 1]],
    words: ["ピアノ", "タイ", "スラー", "リズム", "フィーネ", "フォルテ"]
  },
  intermediate: {
    size: 10,
    directions: [[0, 1], [1, 0]],
    words: ["フォルテ", "ピアノ", "スラー", "レガート", "アレグロ", "リズム", "リピート", "フィーネ"]
  },
  advanced: {
    size: 12,
    directions: [[0, 1], [1, 0]],
    words: ["スタッカート", "クレッシェンド", "リタルダンド", "モデラート", "フェルマータ", "レガート", "リピート", "アレグロ"]
  }
};

const katakana = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン";

const colors = [
  "#ffb3ba",
  "#ffdfba",
  "#fff1a6",
  "#baffc9",
  "#bae1ff",
  "#d5baff",
  "#ffc8dd",
  "#caffbf",
  "#a0c4ff",
  "#ffd6a5"
];

let currentLevel = "beginner";
let gridSize = 8;
let directions = [];
let words = [];
let gridData = [];
let colorIndex = 0;

let selecting = false;
let selected = [];
let startCell = null;

function startGame(level) {
  if (level !== currentLevel) {
    playSound("levelSound");
  }

  currentLevel = level;
  gridSize = levels[level].size;
  directions = levels[level].directions;
  words = [...levels[level].words];
  colorIndex = 0;

  gridData = Array.from(
    { length: gridSize },
    () => Array(gridSize).fill("")
  );

  document.getElementById("grid").innerHTML = "";
  document.getElementById("wordList").innerHTML = "";
  document.getElementById("retryButton").style.display = "none";

  document.querySelectorAll("#levelButtons button")
    .forEach(button => button.classList.remove("active"));

  document.getElementById(`btn-${level}`).classList.add("active");

  words
    .slice()
    .sort((a, b) => b.length - a.length)
    .forEach(placeWord);

  fillEmpty();
  renderWordList();
  renderGrid();
  updateRemaining();
}

function placeWord(word) {
  let placed = false;
  let attempts = 0;

  while (!placed && attempts < 500) {
    attempts++;

    const [dr, dc] = directions[Math.floor(Math.random() * directions.length)];
    const row = Math.floor(Math.random() * gridSize);
    const col = Math.floor(Math.random() * gridSize);

    if (canPlace(word, row, col, dr, dc)) {
      for (let i = 0; i < word.length; i++) {
        gridData[row + dr * i][col + dc * i] = word[i];
      }

      placed = true;
    }
  }
}

function canPlace(word, row, col, dr, dc) {
  for (let i = 0; i < word.length; i++) {
    const r = row + dr * i;
    const c = col + dc * i;

    if (
      r < 0 ||
      r >= gridSize ||
      c < 0 ||
      c >= gridSize ||
      gridData[r][c] !== ""
    ) {
      return false;
    }
  }

  return true;
}

function fillEmpty() {
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      if (gridData[r][c] === "") {
        gridData[r][c] = katakana[Math.floor(Math.random() * katakana.length)];
      }
    }
  }
}

function renderWordList() {
  const list = document.getElementById("wordList");

  words.forEach(word => {
    const div = document.createElement("div");
    div.className = "word";
    div.id = `word-${word}`;
    div.textContent = word;
    list.appendChild(div);
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.style.gridTemplateColumns = `repeat(${gridSize}, var(--cell-size))`;

  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const cell = document.createElement("div");

      cell.className = "cell";
      cell.textContent = gridData[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;

      cell.addEventListener("pointerdown", pointerDown);
      cell.addEventListener("pointerenter", pointerEnter);
      cell.addEventListener("pointermove", pointerMove);

      grid.appendChild(cell);
    }
  }
}

function pointerDown(event) {
  event.preventDefault();

  playSound("dragSound");
  clearSelection();

  selecting = true;
  startCell = this;

  this.setPointerCapture?.(event.pointerId);
  addCell(this);
}

function pointerEnter() {
  if (!selecting) return;
  updateSelection(this);
}

function pointerMove(event) {
  if (!selecting) return;

  const target = document.elementFromPoint(event.clientX, event.clientY);

  if (target && target.classList.contains("cell")) {
    updateSelection(target);
  }
}

document.addEventListener("pointerup", () => {
  if (!selecting) return;

  selecting = false;
  checkAnswer();
});

function updateSelection(endCell) {
  clearSelection();
  addCell(startCell);

  const sr = Number(startCell.dataset.row);
  const sc = Number(startCell.dataset.col);
  const er = Number(endCell.dataset.row);
  const ec = Number(endCell.dataset.col);

  const sameRow = sr === er;
  const sameCol = sc === ec;

  if (!sameRow && !sameCol) return;

  const dr = sameCol ? (er > sr ? 1 : -1) : 0;
  const dc = sameRow ? (ec > sc ? 1 : -1) : 0;

  let r = sr;
  let c = sc;

  while (true) {
    const cell = document.querySelector(
      `[data-row="${r}"][data-col="${c}"]`
    );

    addCell(cell);

    if (r === er && c === ec) break;

    r += dr;
    c += dc;
  }
}

function addCell(cell) {
  if (cell && !selected.includes(cell)) {
    selected.push(cell);
    cell.classList.add("selected");
  }
}

function clearSelection() {
  selected.forEach(cell => {
    cell.classList.remove("selected");
  });

  selected = [];
}

function checkAnswer() {
  const answer = selected.map(cell => cell.textContent).join("");
  const reverseAnswer = [...answer].reverse().join("");

  const matchedWord = words.includes(answer)
    ? answer
    : words.includes(reverseAnswer)
      ? reverseAnswer
      : "";

  if (matchedWord) {
    const color = colors[colorIndex % colors.length];
    colorIndex++;

    selected.forEach(cell => {
      cell.classList.remove("selected");
      cell.style.background = color;
    });

    document.getElementById(`word-${matchedWord}`).classList.add("found");

    words = words.filter(word => word !== matchedWord);

    updateRemaining();

    if (words.length === 0) {
      document.getElementById("remaining").textContent = "クリア！";
      document.getElementById("retryButton").style.display = "inline-block";
      playSound("clearSound");
    }
  } else {
    clearSelection();
  }

  selected = [];
}

function updateRemaining() {
  document.getElementById("remaining").textContent = `あと ${words.length} 個`;
}

document.getElementById("retryButton").addEventListener("click", () => {
  playSound("retrySound");
  startGame(currentLevel);
});

startGame("beginner");
</script>
</body>
</html>
